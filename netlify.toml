[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# The signal engine runs on a schedule (the "constantly reads it" part).
# Plain scheduled function (30s budget) — runs all pairs in parallel with fast
# Gemini Flash, well inside the limit. (Background functions can't be scheduled
# on Netlify and need a paid plan, so this is the correct free setup.)
# Runs every 30 minutes. "@hourly" or "*/15 * * * *" also work.
[functions."signal-engine"]
  schedule = "*/30 * * * *"
